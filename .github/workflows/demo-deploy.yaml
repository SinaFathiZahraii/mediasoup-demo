name: demo-deploy

# Triggers a deploy of the demo server (https://v3demo.mediasoup.org) by
# opening an SSH connection to it. No command is sent: the server runs the
# forced command configured in the SSH user's `.ssh/authorized_keys`, which
# pulls the latest v3 branch, installs deps, transpiles and restarts the PM2
# service.
#
# It runs automatically once the mediasoup-demo-server workflow completes
# successfully for a push to v3 (a human merge/commit), so we never deploy on a
# broken build nor on pull requests. It is also dispatched directly by the
# update-mediasoup workflow, which validates the mediasoup bump before
# dispatching. It can also be triggered manually from the Actions tab.
on:
  workflow_run:
    workflows: [mediasoup-demo-server]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger deploy on the mediasoup-demo application
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    permissions:
      contents: read
    # Run on a manual/automated dispatch (the update-mediasoup workflow dispatches
    # this after validating a bump), or only when the triggering
    # mediasoup-demo-server run succeeded for a push to v3 (a human merge/commit);
    # pull request runs are excluded.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'v3')

    steps:
      - name: Trigger mediasoup-demo application deploy via SSH
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          install -m 600 /dev/null "$HOME/.ssh/deploy_key"
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > "$HOME/.ssh/deploy_key"
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" >> "$HOME/.ssh/known_hosts"

          # No command is given on purpose: the server enforces the forced
          # `command="...deploy/deploy-demo.sh"` in .ssh/authorized_keys, so
          # that script is what actually runs. The install path and PM2 service
          # name are injected by the same authorized_keys entry via `environment=`
          # options, so they never appear in this repo. Its stdout/stderr is
          # streamed back here and shown in the Actions logs.
          ssh -i "$HOME/.ssh/deploy_key" \
              -p "${{ secrets.SSH_PORT }}" \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
