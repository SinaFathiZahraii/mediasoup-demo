apiVersion: v1
kind: Service
metadata:
  name: mediasoup-demo-svc
  namespace: mediasoup
spec:
  type: LoadBalancer
  selector:
    app: mediasoup-demo
  ports:
    - name: signaling
      port: 4443
      targetPort: 4443
      protocol: TCP
			
		- name: rtc-udp-start
      port: 40000
      targetPort: 40000
      nodePort: 40000
      protocol: UDP
    - name: rtc-udp-end
      port: 40999
      targetPort: 40999
      nodePort: 40999
      protocol: UDP
 


